<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./gallery-favicon.svg" />
    <title>Card Gallery · QA</title>
    <script>
      // Force German (source copy — worst case for label collisions) before
      // any module (and thus the i18n locale detection) loads.
      try { localStorage.setItem('worldpulse-locale', 'de'); } catch (e) {}
    </script>
    <style>
      :root {
        --bg: #05070c;
        --panel: #0d1017;
        --line: #1b1f29;
        --line-hi: #3a4356;
        --ink: #cfd4dd;
        --dim: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      /* Toolbar */
      #bar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
        padding: 12px 16px;
        background: rgba(5, 7, 12, 0.92);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--line);
      }
      #bar input, #bar select {
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        font: inherit;
      }
      #bar input[type="search"] { min-width: 210px; }
      #bar input:focus, #bar select:focus { outline: none; border-color: var(--line-hi); }
      #bar label { display: inline-flex; gap: 6px; align-items: center; color: var(--dim); }
      #count { margin-left: auto; color: var(--dim); }

      /* Grid */
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--tw, 320px), 1fr));
        gap: 22px;
        padding: 22px;
        align-items: start;
      }
      figure { margin: 0; cursor: pointer; outline: none; }
      figure canvas {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #000;
        transition: border-color 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
      }
      figure:hover canvas { border-color: var(--line-hi); transform: translateY(-2px); }
      figure:focus-visible canvas {
        border-color: #7aa2ff;
        box-shadow: 0 0 0 2px rgba(122, 162, 255, 0.55);
        transform: translateY(-2px);
      }
      figcaption { padding: 6px 2px 0; }
      figcaption .top { color: var(--ink); word-break: break-all; }
      figcaption .idx { color: var(--dim); }
      figcaption .meta { margin-top: 4px; display: flex; gap: 8px; align-items: center; color: var(--dim); }
      figcaption .chip {
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: #05070c;
      }

      /* Right-click card menu */
      #ctxmenu {
        position: fixed;
        z-index: 30;
        min-width: 168px;
        padding: 4px;
        background: var(--panel);
        border: 1px solid var(--line-hi);
        border-radius: 8px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
      }
      #ctxmenu button {
        display: block;
        width: 100%;
        padding: 7px 10px;
        text-align: left;
        background: none;
        border: none;
        border-radius: 5px;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }
      #ctxmenu button:hover,
      #ctxmenu button:focus-visible { background: var(--line); outline: none; }

      /* Copy confirmation toast */
      #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 40;
        transform: translate(-50%, 8px);
        padding: 8px 14px;
        background: var(--panel);
        border: 1px solid var(--line-hi);
        border-radius: 8px;
        color: var(--ink);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      #toast.show { opacity: 1; transform: translate(-50%, 0); }

      /* Lightbox */
      #lb { position: fixed; inset: 0; z-index: 20; display: none; background: rgba(2, 3, 7, 0.86); backdrop-filter: blur(4px); }
      #lb.open { display: flex; }
      #lb .stage {
        margin: auto;
        display: flex;
        gap: 24px;
        align-items: flex-start;
        padding: 28px 64px;
        max-width: 100%;
        max-height: 100%;
      }
      #lb canvas {
        height: min(90vh, 960px);
        width: auto;
        max-width: 58vw;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #000;
      }
      #lb .info { max-width: 340px; }
      #lb .info h2 { font-size: 16px; margin: 0 0 10px; color: #fff; line-height: 1.3; }
      #lb .info .row { margin: 6px 0; word-break: break-word; }
      #lb .info .k { color: var(--dim); }
      #lb .info .src { margin-top: 14px; white-space: pre-wrap; color: var(--dim); font-size: 12px; line-height: 1.5; }
      #lb button {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        border-radius: 8px;
      }
      #lb button:hover { border-color: var(--line-hi); }
      #lb .nav { position: fixed; top: 50%; transform: translateY(-50%); width: 42px; height: 58px; font-size: 22px; }
      #lb #prev { left: 16px; }
      #lb #next { right: 16px; }
      #lb #close { position: fixed; top: 16px; right: 16px; padding: 8px 12px; }
      #lb #download { position: fixed; top: 58px; right: 16px; padding: 8px 12px; }
      #lb #download:disabled { opacity: 0.5; cursor: progress; }
    </style>
  </head>
  <body>
    <div id="bar">
      <input id="q" type="search" placeholder="Suche id / Titel…" autocomplete="off" />
      <label>Kategorie <select id="cat"></select></label>
      <label>Sortierung
        <select id="sort">
          <option value="newest">neueste</option>
          <option value="category">Kategorie</option>
          <option value="id">A–Z (id)</option>
        </select>
      </label>
      <label>Größe
        <select id="size">
          <option value="220">S</option>
          <option value="320" selected>M</option>
          <option value="460">L</option>
        </select>
      </label>
      <label><input id="live" type="checkbox" checked /> Live-Daten laden</label>
      <span id="count"></span>
    </div>

    <div id="grid"></div>

    <div id="lb" role="dialog" aria-modal="true" aria-label="Karten-Detailansicht">
      <button id="close">✕ Esc</button>
      <button id="download" aria-label="Karte als PNG herunterladen">⭳ PNG</button>
      <button id="prev" class="nav" aria-label="Zurück">‹</button>
      <button id="next" class="nav" aria-label="Weiter">›</button>
      <div class="stage">
        <canvas id="lbCanvas" width="768" height="960"></canvas>
        <div class="info" id="lbInfo"></div>
      </div>
    </div>

    <script type="module" src="/src/dev/gallery.ts"></script>
  </body>
</html>
